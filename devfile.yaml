schemaVersion: 2.2.0
metadata:
  name: dls-devspaces
components:
  - name: kai-dev-container
    container:
      image: quay.io/dbrugger946/dls-devspaces:upstream-0.5.16
      memoryLimit: 4Gi
      mountSources: true
    attributes:
      # This ensures the extensions are installed in the VS Code editor
      vscode-extensions:
        - redhat.java
        - konveyor.konveyor-core
        - konveyor.konveyor-java